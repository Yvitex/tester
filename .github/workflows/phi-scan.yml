name: PHI Scanner

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  scan:
    name: Presidio PHI scan (diff-only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff_range
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.sha }}
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "base=$PR_BASE_SHA" >> "$GITHUB_OUTPUT"
            echo "head=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "base=$PUSH_BEFORE_SHA" >> "$GITHUB_OUTPUT"
            echo "head=$PUSH_AFTER_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .github/scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/scripts/requirements.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg

      - name: Run PHI scan
        env:
          PHI_BASE_SHA: ${{ steps.diff_range.outputs.base }}
          PHI_HEAD_SHA: ${{ steps.diff_range.outputs.head }}
        run: python .github/scripts/scan_phi.py
